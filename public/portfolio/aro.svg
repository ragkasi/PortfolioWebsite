<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#0A0A0F"/>

  <!-- Subtle ambient glow behind orbit -->
  <circle cx="300" cy="175" r="60" fill="#7B6FE0" fill-opacity="0.04" filter="url(#softGlow)"/>

  <!-- Outer ring -->
  <circle cx="300" cy="175" r="110" fill="none" stroke="#7B6FE0" stroke-opacity="0.09" stroke-width="1"/>
  <!-- Middle ring -->
  <circle cx="300" cy="175" r="73" fill="none" stroke="#7B6FE0" stroke-opacity="0.21" stroke-width="1"/>
  <!-- Inner ring -->
  <circle cx="300" cy="175" r="40" fill="none" stroke="#7B6FE0" stroke-opacity="0.33" stroke-width="1"/>

  <!-- Center glowing dot -->
  <circle cx="300" cy="175" r="16" fill="#7B6FE0" filter="url(#glow)"/>

  <!-- "aro" wordmark -->
  <text
    x="300"
    y="328"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="36"
    font-weight="700"
    letter-spacing="6"
    fill="#FFFFFF"
    text-anchor="middle"
  >aro</text>

  <!-- Tagline -->
  <text
    x="300"
    y="358"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="13"
    font-weight="400"
    letter-spacing="1"
    fill="#7B6FE0"
    fill-opacity="0.75"
    text-anchor="middle"
  >Meet through small circles, not endless feeds.</text>
</svg>
